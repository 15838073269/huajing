<html><body><pre id="out"></pre><script>
try {
  var el = document.querySelector('.sa-overlay');
  var result = el ? {left: el.offsetLeft, top: el.offsetTop, width: el.offsetWidth, height: el.offsetHeight, visible: el.offsetHeight > 0 && el.offsetWidth > 0} : 'NOT FOUND';
  document.getElementById('out').textContent = JSON.stringify(result, null, 2);
} catch(e) {
  document.getElementById('out').textContent = 'Error: ' + e.message;
}
</script></body></html>
